            const city = (coupon.city || '').trim();

                                                    </div>

                        <!-- SEO Content Section -->

                            <h2 class="text-xl font-bold text-white mb-4">About Great Clips Coupons</h2>

                                Looking for <strong class="text-white">Great Clips coupons</strong>? You're in the right place! We update this page daily with the latest

                            <p class="mb-6 text-slate-300">

                            <h3 class="text-lg font-semibold text-white mb-3">Frequently Asked Questions</h3>

            `;

        // Initial render
        render();
        
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker not registered', err));
        }
        
        // ============ EMAIL CAPTURE SYSTEM ============
        let pendingCouponUrl = '';
        let pendingCouponPrice = '';
        let pendingLocation = { location_name: '', city: '', state: '' };
        const WORKER_URL = 'https://greatclips-coupons.mehulchaudhari.workers.dev';

        function getCoupon(url, price, location_name, city, state) {
            // Always show email modal — coupon is delivered by email
            pendingCouponUrl = url;
            pendingCouponPrice = price || '';
            pendingLocation = { location_name: location_name || '', city: city || '', state: state || '' };
            document.getElementById('emailModal').classList.remove('hidden');
            document.getElementById('emailInput').value = '';
            document.getElementById('emailInput').focus();
        }

        function closeEmailModal() {
            document.getElementById('emailModal').classList.add('hidden');
            // Reset back to form view for next open
            document.getElementById('emailFormView').classList.remove('hidden');
            document.getElementById('emailSuccessView').classList.add('hidden');
            // Reset submit button state
            const btn = document.querySelector('#emailFormView button[type="submit"]');
            if (btn) { btn.innerHTML = 'Send Me the Coupon 📧'; btn.disabled = false; }
            pendingCouponUrl = '';
            pendingLocation = { location_name: '', city: '', state: '' };
        }

        async function submitEmail(e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();

            if (!email || !email.includes('@')) {
                alert('Please enter a valid email address');
                return;
            }

            const couponUrl = pendingCouponUrl;
            const price = pendingCouponPrice;
            const location = pendingLocation;

            // Show loading state
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = 'Sending... ⏳';
            btn.disabled = true;

            // Send coupon via Cloudflare Worker → Brevo
            let success = false;
            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, coupon_url: couponUrl, price, ...location })
                });
                success = res.ok;
            } catch (_) {}

            // Flip modal to success screen
            document.getElementById('emailFormView').classList.add('hidden');
            const successView = document.getElementById('emailSuccessView');
            document.getElementById('successEmail').textContent = email;
            successView.classList.remove('hidden');
        }

        function skipEmail() {
            const couponUrl = pendingCouponUrl;
            closeEmailModal();
            window.open(couponUrl, '_blank');
        }
        
        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeEmailModal();
        });
    </script>
    
    <!-- Email Capture Modal -->

                    >

                        type="submit"
                        class="w-full bg-gradient-to-r from-violet-600 to-purple-600 hover:from-violet-700 hover:to-purple-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg shadow-purple-200"
                    >

                    </button>
                </form>

                <!-- Trust signals -->

                    🔒 No spam, unsubscribe anytime. We respect your privacy.
                </p>
            </div>

            <!-- SUCCESS VIEW (hidden until email submitted) -->
