name: Generate State Pages

on:
  schedule:
    # Run daily at 1:15 AM Phoenix / 8:15 AM UTC
    - cron: '15 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  TZ: America/Phoenix

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-state-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate state and city pages
        run: |
          python generate_pages.py
          mkdir -p docs
          cp -a pages/. docs/
          python update_sitemap.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A pages docs
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📍 Auto-generate state pages for $(date +'%Y-%m-%d')"
            git push origin HEAD:main
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
